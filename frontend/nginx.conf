# Content-Security-Policy is deliberately not set here: several
# existing components (e.g. the Dashboard/Analytics gauge charts) use
# inline `style` attributes, and the app loads Google Fonts from a
# CDN - a CSP tight enough to be meaningful needs to be built and
# tested against this specific app's asset origins rather than
# bolted on generically, so it's left as a documented follow-up (see
# the deployment guide) instead of risking breaking a working page.
#
# TLS is terminated in front of this container (load balancer/reverse
# proxy) in production - nginx here only ever serves plain HTTP on
# port 80, matching the existing Dockerfile/docker-compose setup.

gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/xml
    image/svg+xml;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Baseline security headers - safe defaults that don't depend on
    # this app's specific asset origins, unlike CSP above.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    # Harmless to send over the plain HTTP this container itself
    # serves - browsers only start honoring it once received over an
    # actual HTTPS connection (i.e. after the TLS-terminating proxy
    # in front of this container forwards it), per the HSTS spec.
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # SPA route fallback - unknown paths (client-side routes) serve
    # index.html instead of a 404 so React Router can handle them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed build assets (dist/assets/*) are safe to cache
    # indefinitely - Vite fingerprints every filename with a content
    # hash, so a new deploy always ships new filenames rather than
    # overwriting a cached one.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
